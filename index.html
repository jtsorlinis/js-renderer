<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Software Renderer</title>
  </head>
  <body>
    <div id="app"></div>

    <div class="viewport">
      <canvas id="canvas"></canvas>
    </div>

    <aside class="sidebar">
      <span class="title">Software Renderer</span>

      <div class="section">
        <label>
          Model (Faces):
          <select id="modelDd">
            <option value="dice">Dice (20)</option>
            <option value="rock">Rock (500)</option>
            <option value="hydrant">Hydrant (3k)</option>
            <option value="treasure">Treasure (10k)</option>
            <option value="head">Head (50k)</option>
            <option value="dragon">Dragon (100k)</option>
            <option value="spartan">Spartan (300k)</option>
            <option value="nyxy" hidden>Nyxy (10k)</option>
          </select>
        </label>
      </div>

      <div class="section">
        <span class="section-heading">Frame</span>
        <span class="stat-value" id="fps">0 (0.0 ms)</span>
      </div>

      <div class="section">
        <span class="section-heading">Shading</span>

        <div class="shading-picker">
          <ul class="shading-list" id="shadingList">
            <li>
              <button
                type="button"
                class="shading-option is-active"
                data-shading-index="9"
                data-shading-value="ibl"
                aria-pressed="true"
              >
                Reflections
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="8"
                data-shading-value="pbr"
                aria-pressed="false"
              >
                Materials
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="7"
                data-shading-value="normalMapped-shadows"
                aria-pressed="false"
              >
                Shadows
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="6"
                data-shading-value="normalMapped"
                aria-pressed="false"
              >
                Normals
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="5"
                data-shading-value="textured"
                aria-pressed="false"
              >
                Textures
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="4"
                data-shading-value="smooth"
                aria-pressed="false"
              >
                Smoothing
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="3"
                data-shading-value="flat"
                aria-pressed="false"
              >
                Lighting
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="2"
                data-shading-value="unlit"
                aria-pressed="false"
              >
                Faces
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="1"
                data-shading-value="depthWireframe"
                aria-pressed="false"
              >
                Depth
              </button>
            </li>
            <li>
              <button
                type="button"
                class="shading-option"
                data-shading-index="0"
                data-shading-value="wireframe"
                aria-pressed="false"
              >
                Wireframe
              </button>
            </li>
          </ul>

          <input
            id="shadingSlider"
            class="shading-slider"
            type="range"
            min="0"
            max="9"
            step="1"
            value="9"
            aria-label="Shading"
          />
        </div>
      </div>

      <div class="section">
        <label><input type="checkbox" id="orthoCb" /> Orthographic</label>
        <label><input type="checkbox" id="highResCb" /> High Res (2x)</label>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Triangles</span>
          <span class="stat-value" id="tris">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Texture</span>
          <span class="stat-value" id="textureSize">0 x 0</span>
        </div>
      </div>

      <div class="section load-glb">
        <button type="button" class="shading-option" id="loadGlbBtn">
          Load GLB
        </button>
        <input
          id="glbInput"
          type="file"
          accept=".glb,model/gltf-binary"
          hidden
        />
      </div>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
