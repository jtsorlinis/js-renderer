<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rendering Journey</title>
    <script type="module" crossorigin src="/js-renderer/journey/assets/index-CmlnL9ob.js"></script>
    <link rel="stylesheet" crossorigin href="/js-renderer/journey/assets/index-DuFzUIwC.css">
  </head>
  <body>
    <div id="app"></div>

    <div class="viewport">
      <canvas id="canvas"></canvas>
    </div>

    <aside class="sidebar">
      <span class="title hideMobile">Rendering Journey</span>

      <div class="section">
        <span class="section-heading">Frame</span>
        <span class="stat-value" id="fps">0 (0.0 ms)</span>
      </div>

      <div class="section">
        <span class="section-heading">Shading</span>

        <div class="shading-picker">
          <ul class="shading-list" id="shadingList"></ul>

          <input
            id="shadingSlider"
            class="shading-slider hideMobile"
            type="range"
            min="0"
            max="10"
            step="1"
            value="10"
            aria-label="Shading"
          />
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Triangles</span>
          <span class="stat-value" id="tris">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Resolution</span>
          <span class="stat-value" id="resolution">0 x 0</span>
        </div>
      </div>
    </aside>

  </body>
</html>
